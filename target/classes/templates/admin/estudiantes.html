<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Estudiantes - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('ADMINISTRADOR')}"></div>
<div class="container-fluid py-4 px-4">
    <h2 class="fw-bold mb-3">Gestión de Estudiantes</h2>
    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body">
            <form th:action="@{/admin/estudiantes}" method="get" class="mb-3 d-flex gap-2">
                <input type="text" name="buscar" class="form-control" placeholder="Buscar por nombre o apellido..." th:value="${buscar}"/>
                <button class="btn btn-primary"><i class="bi bi-search"></i></button>
                <a th:href="@{/admin/estudiantes}" class="btn btn-secondary">Limpiar</a>
            </form>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th><th>Registro</th><th>Apellido</th><th>Nombre</th>
                        <th>Puntaje</th><th>Nivel</th><th>Inglés</th><th>Estado</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e, i : ${estudiantes}">
                        <td th:text="${i.count}"></td>
                        <td class="fw-semibold small" th:text="${e.numeroRegistro}"></td>
                        <td th:text="${e.primerApellido}"></td>
                        <td th:text="${e.primerNombre != null ? e.primerNombre : '-'}"></td>
                        <td>
                            <span class="fw-bold" th:text="${e.puntaje != null ? e.puntaje : 'ANULADO'}"></span>
                        </td>
                        <td>
                            <span th:class="${'badge ' + (e.puntajeNivel == 'Nivel 4' ? 'bg-success' : e.puntajeNivel == 'Nivel 3' ? 'bg-primary' : e.puntajeNivel == 'Nivel 2' ? 'bg-warning text-dark' : 'bg-danger')}"
                                  th:text="${e.puntajeNivel != null ? e.puntajeNivel : '-'}"></span>
                        </td>
                        <td><span class="badge bg-info text-dark" th:text="${e.nivelIngles != null ? e.nivelIngles : '-'}"></span></td>
                        <td>
                            <span th:class="${'badge ' + (e.estado == 'ACTIVO' ? 'bg-success' : e.estado == 'ANULADO' ? 'bg-danger' : 'bg-warning text-dark')}"
                                  th:text="${e.estado}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
