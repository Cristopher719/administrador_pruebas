<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Subir Resultados - Coordinador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body{background:#f0f2f5;}
        .campo-invalido{border-color:#dc3545!important;box-shadow:0 0 0 .2rem rgba(220,53,69,.25)!important;}
        .campo-valido{border-color:#1abc9c!important;box-shadow:0 0 0 .2rem rgba(26,188,156,.25)!important;}
        .rango-info{font-size:11px;color:#6c757d;}
        .puntaje-display{
            background:linear-gradient(135deg,#1a1a2e,#0f3460);
            border-radius:16px;
            color:white;
            text-align:center;
            padding:20px;
        }
        .puntaje-numero{font-size:3.5rem;font-weight:800;line-height:1;}
        .barra-comp{height:8px;border-radius:4px;background:#e9ecef;margin-top:4px;}
        .barra-fill{height:100%;border-radius:4px;transition:width .4s;}
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('COORDINADOR')}"></div>
<div class="container py-4" style="max-width:960px">

    <div class="d-flex align-items-center mb-4 gap-3">
        <a th:href="@{/coordinador/pagos}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h4 class="fw-bold mb-0">Subir Resultados de Prueba</h4>
            <small class="text-muted"
                   th:text="${estudiante.primerApellido + ' — ' + estudiante.numeroRegistro}"></small>
        </div>
    </div>

    <!-- Error servidor -->
    <div th:if="${error}" class="alert alert-danger d-flex align-items-start mb-4">
        <i class="bi bi-exclamation-triangle-fill fs-5 me-2 mt-1"></i>
        <div><strong>Error:</strong> <span th:text="${error}"></span></div>
    </div>

    <!-- Info del estudiante -->
    <div class="card border-0 shadow-sm rounded-3 mb-4">
        <div class="card-body">
            <div class="row g-3 align-items-center">
                <div class="col-md-3">
                    <small class="text-muted d-block">Registro</small>
                    <strong th:text="${estudiante.numeroRegistro}"></strong>
                </div>
                <div class="col-md-3">
                    <small class="text-muted d-block">Apellido</small>
                    <strong th:text="${estudiante.primerApellido}"></strong>
                </div>
                <div class="col-md-3">
                    <small class="text-muted d-block">Tipo de Prueba</small>
                    <span th:class="${'badge fs-6 ' + (estudiante.tipoPrueba.name() == 'SABER_PRO' ? 'bg-dark' : 'bg-secondary')}"
                          th:text="${estudiante.tipoPrueba.name() == 'SABER_PRO' ? 'Saber Pro' : 'Saber T&T'}"></span>
                </div>
                <div class="col-md-3">
                    <small class="text-muted d-block">Puntaje Mínimo Aprobatorio</small>
                    <strong class="text-primary"
                            th:text="${estudiante.getPuntajeMinimo() + ' / ' + estudiante.getPuntajeMaximo() + ' pts'}"></strong>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/coordinador/resultados/{id}(id=${estudiante.id})}"
          method="post" id="formResultados">

        <!-- Campo puntaje oculto — se llena automáticamente -->
        <input type="hidden" name="puntaje" id="puntajeHidden" value="0"/>

        <div class="row g-4">
            <!-- ── Columna izquierda: inputs ────────────────────── -->
            <div class="col-md-8">

                <!-- Competencias genéricas -->
                <div class="card border-0 shadow-sm rounded-3 mb-3">
                    <div class="card-header bg-white border-0 pt-3">
                        <h6 class="fw-bold mb-0">
                            <i class="bi bi-book me-2 text-primary"></i>Competencias Genéricas
                            <small class="fw-normal text-muted">(escala 0–300 c/u)</small>
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Comunicación Escrita</label>
                                <input type="number" name="comEsc" id="comEsc"
                                       class="form-control form-control-sm comp-input"
                                       min="0" max="300" placeholder="0 – 300"
                                       oninput="actualizarTodo()"/>
                                <div class="barra-comp"><div class="barra-fill bg-primary" id="bar-comEsc" style="width:0%"></div></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Razonamiento Cuantitativo</label>
                                <input type="number" name="razCuant" id="razCuant"
                                       class="form-control form-control-sm comp-input"
                                       min="0" max="300" placeholder="0 – 300"
                                       oninput="actualizarTodo()"/>
                                <div class="barra-comp"><div class="barra-fill bg-primary" id="bar-razCuant" style="width:0%"></div></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Lectura Crítica</label>
                                <input type="number" name="lecCrit" id="lecCrit"
                                       class="form-control form-control-sm comp-input"
                                       min="0" max="300" placeholder="0 – 300"
                                       oninput="actualizarTodo()"/>
                                <div class="barra-comp"><div class="barra-fill bg-primary" id="bar-lecCrit" style="width:0%"></div></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Competencias Ciudadanas</label>
                                <input type="number" name="compCiud" id="compCiud"
                                       class="form-control form-control-sm comp-input"
                                       min="0" max="300" placeholder="0 – 300"
                                       oninput="actualizarTodo()"/>
                                <div class="barra-comp"><div class="barra-fill bg-primary" id="bar-compCiud" style="width:0%"></div></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Inglés</label>
                                <input type="number" name="ingles" id="ingles"
                                       class="form-control form-control-sm comp-input"
                                       min="0" max="300" placeholder="0 – 300"
                                       oninput="actualizarTodo()"/>
                                <div class="barra-comp"><div class="barra-fill bg-info" id="bar-ingles" style="width:0%"></div></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-semibold">Nivel Inglés (MCER)</label>
                                <select name="nivelIngles" class="form-select form-select-sm">
                                    <option value="">Seleccionar</option>
                                    <option value="A0">A0</option>
                                    <option value="A1">A1</option>
                                    <option value="A2">A2</option>
                                    <option value="B1">B1</option>
                                    <option value="B2">B2</option>
                                    <option value="C1">C1</option>
                                    <option value="C2">C2</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Competencias específicas -->
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-header bg-white border-0 pt-3">
                        <h6 class="fw-bold mb-0">
                            <i class="bi bi-cpu me-2 text-success"></i>Competencias Específicas — T&amp;I
                            <small class="fw-normal text-muted">(escala 0–300 c/u)</small>
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small fw-semibold">Formulación de Proyectos</label>
                                <input type="number" name="formProy" id="formProy"
                                       class="form-control form-control-sm comp-input"
                                       min="0" max="300" placeholder="0 – 300"
                                       oninput="actualizarTodo()"/>
                                <div class="barra-comp"><div class="barra-fill bg-success" id="bar-formProy" style="width:0%"></div></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-semibold">Pensamiento Científico</label>
                                <input type="number" name="pensCient" id="pensCient"
                                       class="form-control form-control-sm comp-input"
                                       min="0" max="300" placeholder="0 – 300"
                                       oninput="actualizarTodo()"/>
                                <div class="barra-comp"><div class="barra-fill bg-success" id="bar-pensCient" style="width:0%"></div></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-semibold">Diseño de Software</label>
                                <input type="number" name="disSoft" id="disSoft"
                                       class="form-control form-control-sm comp-input"
                                       min="0" max="300" placeholder="0 – 300"
                                       oninput="actualizarTodo()"/>
                                <div class="barra-comp"><div class="barra-fill bg-success" id="bar-disSoft" style="width:0%"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Columna derecha: puntaje calculado ──────────── -->
            <div class="col-md-4">
                <div class="puntaje-display mb-3" id="panelPuntaje">
                    <small class="opacity-75 d-block mb-1">Puntaje Global Calculado</small>
                    <div class="puntaje-numero" id="displayPuntaje">—</div>
                    <small class="opacity-60 d-block mt-1" id="displayEscala"
                           th:text="'Escala 0–' + ${estudiante.getPuntajeMaximo()}"></small>
                    <div class="mt-3">
                        <span id="badgeApto" class="badge fs-6 bg-secondary">Ingresa las notas</span>
                    </div>
                    <div class="mt-2 opacity-75 small" id="msgMinimo"
                         th:text="'Mínimo para graduación: ' + ${estudiante.getPuntajeMinimo()} + ' pts'"></div>
                </div>

                <!-- Resumen competencias ingresadas -->
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-header bg-white border-0 pt-2 pb-2">
                        <small class="fw-bold text-muted">RESUMEN</small>
                    </div>
                    <div class="card-body p-3" id="resumen">
                        <small class="text-muted">Ingresa las notas para ver el resumen.</small>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-3">
                    <button type="submit" class="btn btn-primary btn-lg" id="btnGuardar">
                        <i class="bi bi-save me-2"></i>Guardar Resultados
                    </button>
                    <a th:href="@{/coordinador/pagos}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    var maxGlobal  = /*[[${estudiante.getPuntajeMaximo()}]]*/ 300;
    var minGlobal  = /*[[${estudiante.getPuntajeMinimo()}]]*/ 120;

    // IDs de todos los campos de competencia (sin nivel inglés)
    var campos = ['comEsc','razCuant','lecCrit','compCiud','ingles',
                  'formProy','pensCient','disSoft'];

    var nombresCortos = {
        comEsc:    'Com. Escrita',
        razCuant:  'Raz. Cuantit.',
        lecCrit:   'Lect. Crítica',
        compCiud:  'Comp. Ciudad.',
        ingles:    'Inglés',
        formProy:  'Form. Proy.',
        pensCient: 'Pens. Cient.',
        disSoft:   'Dis. Software'
    };

    function actualizarTodo() {
        var valores = [];
        var hayInvalido = false;

        campos.forEach(function(id) {
            var input = document.getElementById(id);
            var val   = input.value === '' ? null : parseInt(input.value);
            var barra = document.getElementById('bar-' + id);

            input.classList.remove('campo-invalido', 'campo-valido');

            if (val !== null) {
                if (val < 0 || val > 300) {
                    input.classList.add('campo-invalido');
                    hayInvalido = true;
                    if (barra) barra.style.width = '0%';
                } else {
                    input.classList.add('campo-valido');
                    valores.push(val);
                    if (barra) {
                        barra.style.width = (val / 300 * 100) + '%';
                        // Color según nivel
                        barra.className = 'barra-fill ' +
                            (val >= 191 ? 'bg-success' :
                             val >= 156 ? 'bg-primary' :
                             val >= 126 ? 'bg-warning' : 'bg-danger');
                    }
                }
            } else {
                if (barra) barra.style.width = '0%';
            }
        });

        // Calcular promedio solo con los campos que tienen valor
        if (valores.length === 0) {
            document.getElementById('displayPuntaje').textContent = '—';
            document.getElementById('puntajeHidden').value = '0';
            document.getElementById('badgeApto').className = 'badge fs-6 bg-secondary';
            document.getElementById('badgeApto').textContent = 'Ingresa las notas';
            document.getElementById('resumen').innerHTML = '<small class="text-muted">Ingresa las notas para ver el resumen.</small>';
            return;
        }

        var suma = valores.reduce(function(a, b) { return a + b; }, 0);
        var promedio = Math.round(suma / valores.length);

        // Limitar al máximo de la prueba
        var puntajeFinal = Math.min(promedio, maxGlobal);

        document.getElementById('displayPuntaje').textContent = puntajeFinal;
        document.getElementById('puntajeHidden').value = puntajeFinal;

        // Badge de aptitud
        var badge = document.getElementById('badgeApto');
        if (hayInvalido) {
            badge.className = 'badge fs-6 bg-warning text-dark';
            badge.textContent = '⚠ Valores inválidos';
        } else if (puntajeFinal >= minGlobal) {
            badge.className = 'badge fs-6 bg-success';
            badge.textContent = '✓ Apto para graduación';
            document.getElementById('panelPuntaje').style.background = 'linear-gradient(135deg,#16a085,#1abc9c)';
        } else {
            badge.className = 'badge fs-6 bg-danger';
            badge.textContent = '✗ No apto (' + minGlobal + ' pts mín.)';
            document.getElementById('panelPuntaje').style.background = 'linear-gradient(135deg,#c0392b,#e74c3c)';
        }

        // Resumen
        var html = '';
        campos.forEach(function(id) {
            var input = document.getElementById(id);
            if (input.value !== '') {
                var v = parseInt(input.value);
                var color = v >= 191 ? 'success' : v >= 156 ? 'primary' : v >= 126 ? 'warning' : 'danger';
                html += '<div class="d-flex justify-content-between align-items-center mb-1">' +
                        '<small class="text-muted">' + nombresCortos[id] + '</small>' +
                        '<span class="badge bg-' + color + '">' + v + '</span>' +
                        '</div>';
            }
        });
        html += '<hr class="my-2"/>' +
                '<div class="d-flex justify-content-between align-items-center">' +
                '<small class="fw-bold">Promedio calculado</small>' +
                '<strong class="text-primary">' + puntajeFinal + ' pts</strong>' +
                '</div>' +
                '<small class="text-muted">(' + valores.length + ' de ' + campos.length + ' competencias)</small>';
        document.getElementById('resumen').innerHTML = html;
    }

    // Validar antes de enviar
    document.getElementById('formResultados').addEventListener('submit', function(e) {
        var puntaje = parseInt(document.getElementById('puntajeHidden').value);
        if (!puntaje || puntaje <= 0) {
            e.preventDefault();
            alert('Debes ingresar al menos una competencia para calcular el puntaje.');
            return;
        }
        var invalidos = document.querySelectorAll('.campo-invalido');
        if (invalidos.length > 0) {
            e.preventDefault();
            alert('Hay campos con valores fuera de rango (0–300). Corrígelos antes de guardar.');
            return;
        }
    });
</script>
</body>
</html>
