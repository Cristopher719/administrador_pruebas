<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Por Facultad - Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('DOCENTE')}"></div>
<div class="container-fluid py-4 px-4">
    <h2 class="fw-bold mb-1">Estudiantes por Facultad</h2>
    <p class="text-muted mb-4">Consulta de resultados filtrada por facultad</p>

    <!-- Selector de facultad -->
    <div class="card border-0 shadow-sm rounded-3 mb-4">
        <div class="card-body">
            <form th:action="@{/docente/por-facultad}" method="get" class="d-flex gap-2 align-items-end flex-wrap">
                <div class="flex-grow-1">
                    <label class="form-label fw-semibold small">Seleccionar Facultad</label>
                    <select name="facultad" class="form-select">
                        <option value="">-- Todas las facultades --</option>
                        <option th:each="f : ${facultades}" th:value="${f}" th:text="${f}"
                                th:selected="${f == facultadSeleccionada}"></option>
                    </select>
                </div>
                <button class="btn btn-primary"><i class="bi bi-search me-1"></i>Consultar</button>
                <a th:href="@{/docente/por-facultad}" class="btn btn-secondary">Limpiar</a>
            </form>
        </div>
    </div>

    <!-- Resultados -->
    <div th:if="${estudiantes != null}">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">
                <i class="bi bi-building me-2 text-primary"></i>
                <span th:text="${facultadSeleccionada}"></span>
                <span class="badge bg-secondary ms-2" th:text="${estudiantes.size()} + ' estudiantes'"></span>
            </h5>
        </div>

        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th><th>Registro</th><th>Apellido</th><th>Tipo Prueba</th>
                            <th>Puntaje</th><th>Nivel</th><th>Nivel Inglés</th>
                            <th>Apto Grad.</th><th>Beneficio</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="e, i : ${estudiantes}">
                            <td th:text="${i.count}"></td>
                            <td class="small fw-semibold" th:text="${e.numeroRegistro}"></td>
                            <td th:text="${e.primerApellido}"></td>
                            <td>
                                <span th:class="${'badge ' + (e.tipoPrueba.name() == 'SABER_PRO' ? 'bg-dark' : 'bg-secondary')}"
                                      th:text="${e.tipoPrueba.name() == 'SABER_PRO' ? 'Saber Pro' : 'Saber T&T'}"></span>
                            </td>
                            <td><strong th:text="${e.puntaje != null ? e.puntaje : 'Sin datos'}"></strong></td>
                            <td>
                                <span th:if="${e.puntaje != null}"
                                      th:class="${'badge ' + (e.puntajeNivel == 'Nivel 4' ? 'bg-success' : e.puntajeNivel == 'Nivel 3' ? 'bg-primary' : e.puntajeNivel == 'Nivel 2' ? 'bg-warning text-dark' : 'bg-danger')}"
                                      th:text="${e.puntajeNivel}"></span>
                                <span th:unless="${e.puntaje != null}" class="text-muted">-</span>
                            </td>
                            <td><span class="badge bg-info text-dark" th:text="${e.nivelIngles != null ? e.nivelIngles : '-'}"></span></td>
                            <td>
                                <span th:if="${e.aptoParaGraduacion}" class="badge bg-success"><i class="bi bi-check-circle me-1"></i>Apto</span>
                                <span th:unless="${e.aptoParaGraduacion}" class="badge bg-danger"><i class="bi bi-x-circle me-1"></i>No apto</span>
                            </td>
                            <td class="small" th:text="${e.calcularBeneficioCorto()}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(estudiantes)}">
                            <td colspan="9" class="text-center text-muted py-3">No hay estudiantes en esta facultad</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
