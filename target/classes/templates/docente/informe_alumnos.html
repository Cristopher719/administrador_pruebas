<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Informe Alumnos - Docente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body{background:#f0f2f5;} @media print{.no-print{display:none;}}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('DOCENTE')}" class="no-print"></div>
<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2 class="fw-bold mb-0">Informe de Alumnos — Total y Único</h2>
            <p class="text-muted mb-0">Resultados Saber Pro y Saber T&amp;T — UTS 2026</p>
        </div>
        <button onclick="window.print()" class="btn btn-outline-secondary no-print">
            <i class="bi bi-printer me-2"></i>Imprimir
        </button>
    </div>

    <!-- Filtros -->
    <div class="card border-0 shadow-sm rounded-3 mb-4 no-print">
        <div class="card-body">
            <form th:action="@{/docente/informe-alumnos}" method="get" class="d-flex gap-2">
                <a th:href="@{/docente/informe-alumnos(tipo='TODOS')}"
                   th:class="${'btn ' + (tipoFiltro == 'TODOS' ? 'btn-dark' : 'btn-outline-dark')}">
                    Todos (<span th:text="${totalEstudiantes}"></span>)
                </a>
                <a th:href="@{/docente/informe-alumnos(tipo='SABER_PRO')}"
                   th:class="${'btn ' + (tipoFiltro == 'SABER_PRO' ? 'btn-primary' : 'btn-outline-primary')}">
                    <i class="bi bi-mortarboard me-1"></i>Saber Pro
                </a>
                <a th:href="@{/docente/informe-alumnos(tipo='SABER_TYT')}"
                   th:class="${'btn ' + (tipoFiltro == 'SABER_TYT' ? 'btn-secondary' : 'btn-outline-secondary')}">
                    <i class="bi bi-journal-text me-1"></i>Saber T&amp;T
                </a>
            </form>
        </div>
    </div>

    <!-- Resumen -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-3 rounded-3">
                <h5 class="fw-bold text-primary" th:text="${estudiantes.size()}">0</h5>
                <small class="text-muted">Estudiantes en este informe</small>
            </div>
        </div>
        <div class="col-md-4" th:if="${tipoFiltro == 'SABER_PRO' or tipoFiltro == 'TODOS'}">
            <div class="card border-0 shadow-sm text-center p-3 rounded-3">
                <h5 class="fw-bold text-success" th:text="${promedioSaberPro != null ? #numbers.formatDecimal(promedioSaberPro,1,1) : 'N/A'}">0</h5>
                <small class="text-muted">Promedio Saber Pro</small>
            </div>
        </div>
        <div class="col-md-4" th:if="${tipoFiltro == 'SABER_TYT' or tipoFiltro == 'TODOS'}">
            <div class="card border-0 shadow-sm text-center p-3 rounded-3">
                <h5 class="fw-bold text-info" th:text="${promedioSaberTyt != null ? #numbers.formatDecimal(promedioSaberTyt,1,1) : 'N/A'}">0</h5>
                <small class="text-muted">Promedio Saber T&amp;T</small>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th><th>Registro</th><th>Apellido</th><th>Facultad</th>
                        <th>Tipo</th><th>Puntaje</th><th>Nivel</th>
                        <th>Nv. Inglés</th><th>Apto</th><th>Beneficio</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e, i : ${estudiantes}">
                        <td th:text="${i.count}"></td>
                        <td class="small fw-semibold" th:text="${e.numeroRegistro}"></td>
                        <td th:text="${e.primerApellido}"></td>
                        <td class="small" th:text="${e.facultad != null ? e.facultad : '-'}"></td>
                        <td>
                            <span th:class="${'badge ' + (e.tipoPrueba.name() == 'SABER_PRO' ? 'bg-dark' : 'bg-secondary')}"
                                  th:text="${e.tipoPrueba.name() == 'SABER_PRO' ? 'Pro' : 'T&T'}"></span>
                        </td>
                        <td><strong th:text="${e.puntaje != null ? e.puntaje : 'ANULADO'}"></strong></td>
                        <td>
                            <span th:if="${e.puntaje != null}"
                                  th:class="${'badge ' + (e.puntajeNivel == 'Nivel 4' ? 'bg-success' : e.puntajeNivel == 'Nivel 3' ? 'bg-primary' : e.puntajeNivel == 'Nivel 2' ? 'bg-warning text-dark' : 'bg-danger')}"
                                  th:text="${e.puntajeNivel}"></span>
                            <span th:unless="${e.puntaje != null}" class="text-muted">-</span>
                        </td>
                        <td><span class="badge bg-info text-dark" th:text="${e.nivelIngles != null ? e.nivelIngles : '-'}"></span></td>
                        <td>
                            <i th:class="${e.aptoParaGraduacion ? 'bi bi-check-circle-fill text-success' : 'bi bi-x-circle-fill text-danger'}"></i>
                        </td>
                        <td class="small" th:text="${e.calcularBeneficioCorto()}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(estudiantes)}">
                        <td colspan="10" class="text-center text-muted py-3">Sin registros</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
