<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Mis Datos - Saber Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('ESTUDIANTE')}"></div>
<div class="container py-4" style="max-width:700px">
    <h2 class="fw-bold mb-4">Datos Personales</h2>

    <div th:if="${estudiante != null}">
        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-header" style="background:linear-gradient(135deg,#1a1a2e,#0f3460)">
                <div class="d-flex align-items-center gap-3 py-2">
                    <div class="rounded-circle bg-white d-flex align-items-center justify-content-center" style="width:56px;height:56px">
                        <i class="bi bi-person-fill fs-3 text-primary"></i>
                    </div>
                    <div class="text-white">
                        <h5 class="mb-0 fw-bold" th:text="${estudiante.primerApellido + (estudiante.segundoApellido != null ? ' ' + estudiante.segundoApellido : '')}"></h5>
                        <small class="opacity-75" th:text="${estudiante.primerNombre != null ? estudiante.primerNombre : ''}"></small>
                    </div>
                </div>
            </div>
            <div class="card-body p-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">TIPO DOCUMENTO</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.tipoDocumento != null ? estudiante.tipoDocumento : '-'}"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">NÚMERO DOCUMENTO</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.numeroDocumento != null ? estudiante.numeroDocumento : '-'}"></p>
                    </div>
                    <div class="col-12"><hr class="my-1"/></div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">PRIMER APELLIDO</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.primerApellido}"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">SEGUNDO APELLIDO</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.segundoApellido != null ? estudiante.segundoApellido : '-'}"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">PRIMER NOMBRE</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.primerNombre != null ? estudiante.primerNombre : '-'}"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">SEGUNDO NOMBRE</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.segundoNombre != null ? estudiante.segundoNombre : '-'}"></p>
                    </div>
                    <div class="col-12"><hr class="my-1"/></div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">CORREO ELECTRÓNICO</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.correo != null ? estudiante.correo : '-'}"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">TELÉFONO</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.telefono != null ? estudiante.telefono : '-'}"></p>
                    </div>
                    <div class="col-12"><hr class="my-1"/></div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">NÚMERO DE REGISTRO</label>
                        <p class="fw-bold text-primary mb-0" th:text="${estudiante.numeroRegistro}"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">ESTADO</label>
                        <p class="mb-0">
                            <span th:class="${'badge ' + (estudiante.estado == 'ACTIVO' ? 'bg-success' : 'bg-danger')}"
                                  th:text="${estudiante.estado}"></span>
                        </p>
                    </div>
                    <div class="col-md-6">
                        <label class="text-muted small fw-semibold">PAGO SABER PRO</label>
                        <p class="mb-0">
                            <span th:if="${estudiante.pagoCargado}" class="badge bg-success"><i class="bi bi-check-circle me-1"></i>Cargado</span>
                            <span th:unless="${estudiante.pagoCargado}" class="badge bg-warning text-dark"><i class="bi bi-clock me-1"></i>Pendiente</span>
                        </p>
                    </div>
                    <div class="col-md-6" th:if="${estudiante.pagoCargado and estudiante.comprobantePago != null}">
                        <label class="text-muted small fw-semibold">COMPROBANTE</label>
                        <p class="fw-semibold mb-0" th:text="${estudiante.comprobantePago}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${estudiante == null}" class="alert alert-info mt-3">
        <i class="bi bi-info-circle me-2"></i>No se encontraron datos personales asociados a tu cuenta.
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
