<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Informe General</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body{background:#f0f2f5;} @media print{.no-print{display:none;}}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('COORDINADOR')}" class="no-print"></div>
<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold mb-0">Informe General — Saber Pro 2026</h2>
        <button onclick="window.print()" class="btn btn-outline-secondary no-print"><i class="bi bi-printer me-2"></i>Imprimir</button>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="card border-0 shadow-sm text-center p-3"><h5 class="fw-bold text-primary" th:text="${total}">0</h5><small class="text-muted">Total Inscritos</small></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm text-center p-3"><h5 class="fw-bold text-success" th:text="${promedio != null ? #numbers.formatDecimal(promedio,1,1) : 'N/A'}">0</h5><small class="text-muted">Promedio General</small></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm text-center p-3"><h5 class="fw-bold text-warning" th:text="${nivel4}">0</h5><small class="text-muted">Nivel 4 (≥191)</small></div></div>
        <div class="col-md-3"><div class="card border-0 shadow-sm text-center p-3"><h5 class="fw-bold text-danger" th:text="${nivel1}">0</h5><small class="text-muted">Nivel 1 (&lt;126)</small></div></div>
    </div>
    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-striped mb-0">
                    <thead class="table-dark">
                    <tr><th>#</th><th>Registro</th><th>Apellido</th><th>Puntaje</th><th>Nivel</th><th>Com.E.</th><th>Raz.C.</th><th>Lect.C.</th><th>Comp.C.</th><th>Inglés</th><th>F.Proy.</th><th>P.Cient.</th><th>D.Soft.</th><th>Nv.Ing.</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="e, i : ${estudiantes}">
                        <td th:text="${i.count}"></td>
                        <td class="small" th:text="${e.numeroRegistro}"></td>
                        <td th:text="${e.primerApellido}"></td>
                        <td><strong th:text="${e.puntaje != null ? e.puntaje : 'ANULADO'}"></strong></td>
                        <td><span th:class="${'badge ' + (e.puntajeNivel == 'Nivel 4' ? 'bg-success' : e.puntajeNivel == 'Nivel 3' ? 'bg-primary' : e.puntajeNivel == 'Nivel 2' ? 'bg-warning text-dark' : 'bg-danger')}"
                                  th:text="${e.puntajeNivel != null ? e.puntajeNivel : '-'}"></span></td>
                        <td th:text="${e.comunicacionEscrita != null ? e.comunicacionEscrita : '-'}"></td>
                        <td th:text="${e.razonamientoCuantitativo != null ? e.razonamientoCuantitativo : '-'}"></td>
                        <td th:text="${e.lecturaCritica != null ? e.lecturaCritica : '-'}"></td>
                        <td th:text="${e.competenciasCiudadanas != null ? e.competenciasCiudadanas : '-'}"></td>
                        <td th:text="${e.ingles != null ? e.ingles : '-'}"></td>
                        <td th:text="${e.formulacionProyectos != null ? e.formulacionProyectos : '-'}"></td>
                        <td th:text="${e.pensamientoCientifico != null ? e.pensamientoCientifico : '-'}"></td>
                        <td th:text="${e.disenoSoftware != null ? e.disenoSoftware : '-'}"></td>
                        <td><span class="badge bg-info text-dark" th:text="${e.nivelIngles != null ? e.nivelIngles : '-'}"></span></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
