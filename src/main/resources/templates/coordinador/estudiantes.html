<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Estudiantes - Coordinador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('COORDINADOR')}"></div>
<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between mb-3">
        <h2 class="fw-bold mb-0">Gestión de Estudiantes</h2>
        <a th:href="@{/coordinador/estudiantes/nuevo}" class="btn btn-success">
            <i class="bi bi-plus me-1"></i>Nuevo Estudiante
        </a>
    </div>

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible">
        <i class="bi bi-check-circle me-2"></i><span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body">
            <!-- Filtros -->
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <form th:action="@{/coordinador/estudiantes}" method="get" class="d-flex gap-2">
                        <input type="text" name="buscar" class="form-control" placeholder="Buscar por nombre o apellido..." th:value="${buscar}"/>
                        <button class="btn btn-primary"><i class="bi bi-search"></i></button>
                        <a th:href="@{/coordinador/estudiantes}" class="btn btn-secondary">Limpiar</a>
                    </form>
                </div>
                <div class="col-md-6 d-flex gap-2 flex-wrap">
                    <a th:href="@{/coordinador/estudiantes}" class="btn btn-sm btn-outline-dark">Todos</a>
                    <a th:href="@{/coordinador/estudiantes(estado='PENDIENTE_PAGO')}" class="btn btn-sm btn-outline-danger">Pendiente Pago</a>
                    <a th:href="@{/coordinador/estudiantes(estado='PAGO_EN_REVISION')}" class="btn btn-sm btn-outline-warning">En Revisión</a>
                    <a th:href="@{/coordinador/estudiantes(estado='INSCRITO')}" class="btn btn-sm btn-outline-primary">Inscritos</a>
                    <a th:href="@{/coordinador/estudiantes(estado='FINALIZADO')}" class="btn btn-sm btn-outline-success">Finalizados</a>
                    <a th:href="@{/coordinador/estudiantes(estado='ANULADO')}" class="btn btn-sm btn-outline-secondary">Anulados</a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th><th>Registro</th><th>Apellido</th><th>Tipo Prueba</th>
                        <th>Puntaje</th><th>Nivel</th><th>Estado</th><th>Apto Grado</th><th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e, i : ${estudiantes}">
                        <td th:text="${i.count}"></td>
                        <td class="fw-semibold small" th:text="${e.numeroRegistro}"></td>
                        <td th:text="${e.primerApellido}"></td>
                        <td>
                            <span th:class="${'badge ' + (e.tipoPrueba.name() == 'SABER_PRO' ? 'bg-dark' : 'bg-secondary')}"
                                  th:text="${e.tipoPrueba.name() == 'SABER_PRO' ? 'Saber Pro' : 'Saber T&T'}"></span>
                        </td>
                        <td><strong th:text="${e.puntaje != null ? e.puntaje : '-'}"></strong></td>
                        <td>
                            <span th:if="${e.puntaje != null}"
                                  th:class="${'badge ' + (e.puntajeNivel == 'Nivel 4' ? 'bg-success' : e.puntajeNivel == 'Nivel 3' ? 'bg-primary' : e.puntajeNivel == 'Nivel 2' ? 'bg-warning text-dark' : 'bg-danger')}"
                                  th:text="${e.puntajeNivel}"></span>
                            <span th:unless="${e.puntaje != null}" class="text-muted small">Sin notas</span>
                        </td>
                        <td>
                            <span th:class="${'badge ' +
                                (e.estado == 'FINALIZADO'       ? 'bg-success' :
                                 e.estado == 'INSCRITO'         ? 'bg-primary' :
                                 e.estado == 'PAGO_EN_REVISION' ? 'bg-warning text-dark' :
                                 e.estado == 'PENDIENTE_PAGO'   ? 'bg-danger' :
                                 e.estado == 'ACTIVO'           ? 'bg-success' : 'bg-secondary')}"
                                  th:text="${e.estado}"></span>
                        </td>
                        <td>
                            <i th:if="${e.aptoParaGraduacion}" class="bi bi-check-circle-fill text-success"></i>
                            <i th:unless="${e.aptoParaGraduacion}" class="bi bi-x-circle text-muted"></i>
                        </td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/coordinador/estudiantes/editar/{id}(id=${e.id})}"
                                   class="btn btn-outline-warning" title="Editar"><i class="bi bi-pencil"></i></a>
                                <a th:if="${e.estado == 'INSCRITO'}"
                                   th:href="@{/coordinador/resultados/{id}(id=${e.id})}"
                                   class="btn btn-outline-primary" title="Subir resultados"><i class="bi bi-upload"></i></a>
                                <a th:href="@{/coordinador/estudiantes/anular/{id}(id=${e.id})}"
                                   class="btn btn-outline-danger" title="Anular"
                                   onclick="return confirm('¿Anular este estudiante?')"><i class="bi bi-slash-circle"></i></a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(estudiantes)}">
                        <td colspan="9" class="text-center text-muted py-4">No hay estudiantes con este filtro</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
