<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Formulario Estudiante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar('COORDINADOR')}"></div>
<div class="container py-4" style="max-width:900px">
    <div class="d-flex align-items-center mb-4 gap-3">
        <a th:href="@{/coordinador/estudiantes}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="fw-bold mb-0" th:text="${estudiante.id != null ? 'Editar Estudiante' : 'Nuevo Estudiante'}">Formulario</h4>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
    </div>

    <div class="card border-0 shadow-sm rounded-3">
        <div class="card-body p-4">
            <form th:action="${estudiante.id != null ? '/coordinador/estudiantes/editar/' + estudiante.id : '/coordinador/estudiantes/nuevo'}"
                  th:object="${estudiante}" method="post">

                <!-- Datos personales -->
                <h6 class="fw-bold text-primary mb-3 border-bottom pb-2">
                    <i class="bi bi-person me-2"></i>Datos Personales
                </h6>
                <div class="row g-3 mb-4">
                    <div class="col-md-2">
                        <label class="form-label small fw-semibold">Tipo Doc.</label>
                        <select th:field="*{tipoDocumento}" class="form-select form-select-sm">
                            <option value="CC">CC</option>
                            <option value="TI">TI</option>
                            <option value="CE">CE</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-semibold">Número Documento</label>
                        <input type="text" th:field="*{numeroDocumento}" class="form-control form-control-sm"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Número de Registro *</label>
                        <input type="text" th:field="*{numeroRegistro}" class="form-control form-control-sm"
                               th:readonly="${estudiante.id != null}" required/>
                        <div th:if="${estudiante.id != null}" class="form-text text-muted">El registro no se puede cambiar</div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Primer Apellido *</label>
                        <input type="text" th:field="*{primerApellido}" class="form-control form-control-sm" required/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Segundo Apellido</label>
                        <input type="text" th:field="*{segundoApellido}" class="form-control form-control-sm"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Primer Nombre</label>
                        <input type="text" th:field="*{primerNombre}" class="form-control form-control-sm"/>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-semibold">Segundo Nombre</label>
                        <input type="text" th:field="*{segundoNombre}" class="form-control form-control-sm"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-semibold">Correo</label>
                        <input type="email" th:field="*{correo}" class="form-control form-control-sm"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-semibold">Teléfono</label>
                        <input type="text" th:field="*{telefono}" class="form-control form-control-sm"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-semibold">Facultad</label>
                        <input type="text" th:field="*{facultad}" class="form-control form-control-sm"
                               placeholder="Ej: Tecnología e Ingeniería"/>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-semibold">Tipo de Prueba *</label>
                        <select th:field="*{tipoPrueba}" class="form-select form-select-sm">
                            <option value="SABER_PRO">Saber Pro (escala 0-300, mín. 120)</option>
                            <option value="SABER_TYT">Saber T&amp;T (escala 0-200, mín. 80)</option>
                        </select>
                    </div>
                    <div class="col-md-4" th:if="${estudiante.id != null}">
                        <label class="form-label small fw-semibold">Estado</label>
                        <select th:field="*{estado}" class="form-select form-select-sm">
                            <option value="PENDIENTE_PAGO">PENDIENTE_PAGO</option>
                            <option value="PAGO_EN_REVISION">PAGO_EN_REVISION</option>
                            <option value="INSCRITO">INSCRITO</option>
                            <option value="FINALIZADO">FINALIZADO</option>
                            <option value="ANULADO">ANULADO</option>
                        </select>
                    </div>
                </div>

                <!-- Acceso al sistema — solo al crear -->
                <div th:if="${estudiante.id == null}">
                    <h6 class="fw-bold text-success mb-3 border-bottom pb-2">
                        <i class="bi bi-shield-lock me-2"></i>Credenciales de Acceso
                    </h6>
                    <div class="alert alert-info small mb-3">
                        <i class="bi bi-info-circle me-2"></i>
                        Define el usuario y contraseña con los que el estudiante ingresará al sistema.
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Usuario *</label>
                            <input type="text" name="username" class="form-control form-control-sm"
                                   placeholder="Ej: juan.garcia o cc123456" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Contraseña *</label>
                            <input type="text" name="password" class="form-control form-control-sm"
                                   placeholder="Contraseña inicial" required/>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>
                        <span th:text="${estudiante.id != null ? 'Actualizar' : 'Crear Estudiante'}">Guardar</span>
                    </button>
                    <a th:href="@{/coordinador/estudiantes}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
